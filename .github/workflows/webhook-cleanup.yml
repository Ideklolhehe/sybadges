name: Webhook Dead Letter Cleanup

on:
  workflow_dispatch: # Manual trigger only (schedule deactivated)

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Archive Failed Deliveries
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/cron/webhook-cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Requested-By: github-actions" \
            -H "Content-Type: application/json" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response Code: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Cleanup endpoint returned non-200 status"
            exit 1
          fi
        shell: bash
